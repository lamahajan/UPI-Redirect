<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Fee Payment — Lotus International School</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;}
body{
  height:100vh;
  background:#f5f5f7;
  font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;
  align-items:center;
}

/* Wrapper fills screen */
.wrap{
  width:100%;max-width:430px;
  height:100vh;
  display:flex;flex-direction:column;
  background:#fff;
}

/* Hero — full branded section, no separate logobar */
.hero{
  background:linear-gradient(165deg,#0f2545 0%,#1a3a70 100%);
  padding:22px 24px 42px;
  text-align:center;
  position:relative;overflow:hidden;flex-shrink:0;
}
.hero::before{
  content:"";position:absolute;
  top:-50px;left:50%;transform:translateX(-50%);
  width:280px;height:180px;
  background:radial-gradient(ellipse,rgba(255,255,255,.07) 0%,transparent 70%);
  pointer-events:none;
}
.hero::after{
  content:"";position:absolute;
  bottom:-22px;left:-5%;width:110%;height:46px;
  background:#fff;
  border-radius:50% 50% 0 0/100% 100% 0 0;
  pointer-events:none;
}
.hero-logo{
  display:flex;align-items:center;justify-content:center;gap:9px;
  margin-bottom:14px;position:relative;z-index:1;
}
.hero-logo-icon{
  width:34px;height:34px;border-radius:9px;
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.hero-school-name{
  font-size:13px;font-weight:700;color:rgba(255,255,255,.88);
  letter-spacing:.2px;line-height:1.2;text-align:left;
}
.hero-school-sub{
  font-size:9px;font-weight:500;color:rgba(255,255,255,.4);
  letter-spacing:1.4px;text-transform:uppercase;
}
.hero-divider{
  width:32px;height:1px;background:rgba(255,255,255,.15);
  margin:0 auto 12px;position:relative;z-index:1;
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:5px;
  font-size:9px;font-weight:600;
  color:rgba(255,255,255,.45);letter-spacing:1.8px;text-transform:uppercase;
  margin-bottom:6px;position:relative;z-index:1;
}
.eyebrow-dot{width:5px;height:5px;border-radius:50%;background:#4ade80;flex-shrink:0;}
.hero-title{
  font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;
  position:relative;z-index:1;
}

/* Scrollable content area */
.body{
  flex:1;overflow-y:auto;
  padding:28px 20px 16px;
  -webkit-overflow-scrolling:touch;
}
#info-box{display:none;}

.stu-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.avatar{
  width:48px;height:48px;flex-shrink:0;border-radius:13px;
  background:linear-gradient(135deg,#0f2545,#1a3a6e);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;
}
.stu-name{font-size:14px;font-weight:700;color:#1d1d1f;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stu-adm{font-size:11px;color:#6e6e73;margin-top:2px;}
.stu-class{font-size:11px;color:#6e6e73;margin-top:1px;}
.sep{height:1px;background:#f0f0f0;margin:0 0 14px;}

.amount-label{font-size:10px;font-weight:600;color:#aeaeb2;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px;}
.amount-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;}
.amount-val{font-size:32px;font-weight:800;color:#1d1d1f;letter-spacing:-1.2px;line-height:1;}
.due-pill{
  font-size:10px;font-weight:700;color:#f59e0b;
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);
  padding:4px 10px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;
}

.upi-row{display:flex;gap:6px;margin-bottom:12px;}
.upi-chip{
  flex:1;text-align:center;background:#f5f5f7;border-radius:9px;
  padding:7px 2px;font-size:10px;font-weight:600;color:#3a3a3c;letter-spacing:.2px;
}

.prog-wrap{height:2px;background:#e8e8ed;border-radius:2px;overflow:hidden;margin-bottom:12px;}
.prog-bar{height:100%;background:#0071e3;border-radius:2px;width:0;transition:width .8s linear;}

#state-redirecting{display:none;}
#state-redirecting.active{display:block;}

.btn-primary{
  display:block;width:100%;
  background:#0071e3;color:#fff;
  font-size:15px;font-weight:600;border:none;border-radius:12px;
  padding:14px;text-align:center;text-decoration:none;cursor:pointer;
  box-shadow:0 2px 10px rgba(0,113,227,.22);
  transition:all .15s;margin-bottom:8px;
}
.btn-primary:active{background:#005bbf;transform:scale(.985);}
.btn-secondary{
  display:block;width:100%;
  background:#f5f5f7;color:#1d1d1f;
  font-size:15px;font-weight:500;border:none;border-radius:12px;
  padding:13px;text-align:center;text-decoration:none;cursor:pointer;
  transition:all .15s;margin-bottom:14px;
}
.btn-secondary:active{background:#e8e8ed;}

.secure{display:flex;align-items:center;justify-content:center;gap:5px;}
.secure svg{opacity:.3;}
.secure span{font-size:11px;color:#aeaeb2;}

/* Footer — pinned to bottom */
.footer{
  flex-shrink:0;
  background:#f5f5f7;
  border-top:1px solid #e8e8ed;
  padding:12px 20px 16px;
  text-align:center;
}
.footer-school{font-size:12px;font-weight:600;color:#3a3a3c;margin-bottom:1px;}
.footer-label{font-size:10px;color:#aeaeb2;margin-bottom:7px;}
.call-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:#fff;border:1px solid #e0e0e5;border-radius:980px;
  padding:8px 18px;font-size:13px;font-weight:600;color:#0071e3;
  text-decoration:none;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:all .15s;
}
.call-btn:active{transform:scale(.97);}

#state-error{display:none;padding:8px 0;text-align:center;}
#state-error.active{display:block;}
.err-icon{font-size:32px;margin-bottom:8px;}
.err-msg{font-size:15px;font-weight:600;color:#ff3b30;margin-bottom:4px;}
.err-sub{font-size:13px;color:#6e6e73;line-height:1.6;}
</style>
</head>

<script>
(function(){
  var p=new URLSearchParams(window.location.search);
  var adm=(p.get("adm")||"care").trim();
  var am=(p.get("am")||"5000").trim();
  var name=(p.get("name")||"Test Student").trim();
  var cls=(p.get("class")||"").trim();

  if(!adm||!am||isNaN(parseFloat(am))){
    document.getElementById("state-error").classList.add("active");
    document.getElementById("state-error").style.display="block";
    return;
  }
  document.getElementById("disp-name").textContent=name||"—";
  document.getElementById("disp-adm").textContent=adm;
  document.getElementById("disp-class").textContent=cls||"—";
  document.getElementById("disp-am").textContent="₹"+parseFloat(am).toLocaleString("en-IN");
  var initials=name?name.trim().split(" ").map(function(w){return w[0];}).slice(0,2).join("").toUpperCase():adm.slice(0,2).toUpperCase();
  document.getElementById("chip-initials").textContent=initials;
  document.getElementById("info-box").style.display="block";
  var tr=adm+(name?"-"+name+"'s Fee":" Fee");
  var upi="upi://pay?pa=lisdnn@icici&pn=LOTUS%20INTERNATIONAL%20SCHOOL&tr="+encodeURIComponent(tr)+"&tn="+encodeURIComponent(adm)+"&am="+encodeURIComponent(am)+"&cu=INR&mc=8299";
  document.getElementById("pay-btn").href=upi;
  var rd=document.getElementById("state-redirecting");
  rd.style.display="block";rd.classList.add("active");
  setTimeout(function(){document.getElementById("prog-bar").style.width="100%";},50);

  setTimeout(function(){
    window.location.href=upi;
    // If still visible after 1.8s = desktop/no UPI app, show fallback
    setTimeout(function(){
      if(!document.hidden && !window._upiOpened){
        showDesktopFallback(upi);
      }
    },1800);
  },800);

  document.addEventListener("visibilitychange",function(){
    if(document.hidden) window._upiOpened=true;
  });
})();

function showDesktopFallback(upi){
  if(window._upiOpened) return;
}
</script>
